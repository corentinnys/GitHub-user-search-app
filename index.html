<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon-32x32.png">
    <link rel="stylesheet" href="css/main.css">

    <title>Frontend Mentor | GitHub user search app</title>
</head>

<body>
<section class="container">

    <header>
        <div class="header-top">
            <h1>devfinder</h1>

            <div class="theme-switcher">
                <p class="theme-text">DARK</p>
                <button class="theme-button" aria-label="Toggle theme">
                    <svg width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19.513 11.397a.701.701 0 00-.588.128 7.496 7.496 0 01-2.276 1.336 7.101 7.101 0 01-2.583.462 7.505 7.505 0 01-5.32-2.209 7.568 7.568 0 01-2.199-5.342c0-.873.154-1.72.41-2.49a6.904 6.904 0 011.227-2.21.657.657 0 00-.102-.924.701.701 0 00-.589-.128C5.32.61 3.427 1.92 2.072 3.666A10.158 10.158 0 000 9.83c0 2.8 1.125 5.342 2.967 7.19a10.025 10.025 0 007.16 2.98c2.353 0 4.527-.822 6.266-2.183a10.13 10.13 0 003.58-5.624.623.623 0 00-.46-.796z" fill="#697C9A"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Search bar -->
        <div class="search-bar">
            <img src="assets/icon-search.svg" alt="Search icon" class="search-icon" />
            <input
                    type="text"
                    placeholder="Search GitHub username..."
                    class="search-input"
                    aria-label="Search GitHub username"
                    id="search-input"
            />
            <button class="search-btn" id="search">Search</button>
        </div>
    </header>

    <main class="user-card">

        <!-- Left column -->
        <div class="avatar-container">
            <img src="assets/images/avatar-placeholder.jpg" alt="User avatar" class="user-avatar" id="avatar">
        </div>

        <!-- Right column -->
        <div class="right-column">

            <div class="profile-header">
                <div class="profile-info">
                    <div class="name-container">
                        <h2 class="user-name" id="name">The Octocat</h2>
                        <p class="user-username" id="username">@octocat</p>
                    </div>
                    <p class="user-joined" id="joined">Joined 25 Jan 2011</p>
                </div>
                <div class="user-bio-container">
                    <p class="user-bio" id="bio">
                        Lorem ipsum dolor sit amet...
                    </p>
                </div>
            </div>



            <div class="stats-container">
                <div class="stat-item">
                    <p class="stat-label">Repos</p>
                    <p class="stat-number" id="repos">8</p>
                </div>

                <div class="stat-item">
                    <p class="stat-label">Followers</p>
                    <p class="stat-number" id="followers">3938</p>
                </div>

                <div class="stat-item">
                    <p class="stat-label">Following</p>
                    <p class="stat-number" id="following">9</p>
                </div>
            </div>

            <div class="info-container">

                <div class="info-row">

                    <div class="info-item">
                        <div class="info-icon">
                            <svg class="icon" width="20" height="20">
                                <use xlink:href="#icon-location"></use>
                            </svg>
                        </div>
                        <p class="info-text" id="location">San Francisco</p>
                    </div>

                    <div class="info-item">
                        <div class="info-icon">
                            <svg class="icon" width="20" height="20">
                                <use xlink:href="#icon-website"></use>
                            </svg>
                        </div>
                        <a href="#" target="_blank" class="info-link" id="website">
                            github
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </main>

    <!-- SVG icons -->
    <svg style="display: none;">
        <symbol id="icon-location" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </symbol>

        <symbol id="icon-website" viewBox="0 0 24 24">
            <path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1 0 1.71-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/>
        </symbol>
    </svg>

</section>
<script src="https://code.jquery.com/jquery-4.0.0.js"></script>
<script src="scripts/request.js"></script>

</body>
</html>
